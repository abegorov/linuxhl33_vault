---
- name: Check existing secrets engines
  community.hashi_vault.vault_read:
    url: '{{ vault_config_url }}'
    validate_certs: '{{ vault_config_validate_certs }}'
    auth_method: token
    token: '{{ vault_config_token }}'
    path: sys/mounts
  register: _vault_config_existing_mounts

- name: Update vault engines
  community.hashi_vault.vault_write:
    url: '{{ vault_config_url }}'
    validate_certs: '{{ vault_config_validate_certs }}'
    auth_method: token
    token: '{{ vault_config_token }}'
    path: 'sys/mounts/{{ item.key }}'
    data: '{{ item.value }}'
  when: item.key + '/' not in _vault_config_existing_mounts.data.data
  loop: '{{ vault_config_engines | ansible.builtin.dict2items }}'
  loop_control:
    label: '{{ item.key }}'
...
