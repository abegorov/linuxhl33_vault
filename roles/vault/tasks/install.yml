- name: Install vault
  kubernetes.core.helm:
    name: '{{ vault_release_name }}'
    chart_ref: '{{ vault_chart_ref }}'
    chart_repo_url: '{{ vault_chart_repo_url }}'
    chart_version: '{{ vault_chart_version }}'
    force: true
    release_namespace: '{{ vault_release_namespace }}'
    create_namespace: true
    release_values: '{{ vault_release_values }}'
    kubeconfig: '{{ vault_kubeconfig }}'
    wait: true
    wait_timeout: '{{ vault_wait_timeout }}s'

- name: Wait for vault startup
  kubernetes.core.k8s_info:
    kubeconfig: '{{ vault_kubeconfig }}'
    kind: Pod
    name: '{{ vault_release_name }}-{{ item }}'
    namespace: '{{ vault_release_namespace }}'
  loop: '{{ range(vault_replicas) | list }}'
  register: _vault_pod
  retries: '{{ vault_startup_retries }}'
  delay: '{{ vault_startup_delay }}'
  until:
    - _vault_pod.resources | length > 0
    - _vault_pod.resources[0].status.phase == "Running"
...
