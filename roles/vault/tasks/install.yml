---
- name: Create vault cert issuer
  kubernetes.core.k8s:
    resource_definition: '{{ vault_cert }}'
    apply: true
    server_side_apply:
      field_manager: ansible
      force_conflicts: true
    kubeconfig: '{{ vault_kubeconfig }}'
    wait: true
    wait_timeout: '{{ vault_wait_timeout }}'

