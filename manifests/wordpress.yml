---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: wordpress
    app.kubernetes.io/name: wordpress
  name: wordpress
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: wordpress
      app.kubernetes.io/name: wordpress
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: wordpress
        app.kubernetes.io/name: wordpress
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: wordpress
                  app.kubernetes.io/name: wordpress
              topologyKey: kubernetes.io/hostname
            weight: 1
      containers:
      - image: docker.angie.software/angie:{{ wordpress_angie_version }}
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 6
          initialDelaySeconds: 120
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 8080
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 6
          httpGet:
            httpHeaders: []
            path: /wp-login.php
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: angie-sidecar
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          limits:
            cpu: 100m
            ephemeral-storage: 256Mi
            memory: 64Mi
          requests:
            cpu: 50m
            ephemeral-storage: 100Mi
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 101
          runAsNonRoot: true
          runAsUser: 101
        volumeMounts:
        - mountPath: /etc/angie/http.d/default.conf
          name: angie-config
          subPath: default.conf
        - mountPath: /run
          name: empty-dir
          subPath: run-dir
        - mountPath: /run/angie
          name: empty-dir
          subPath: run-angie-dir
        - mountPath: /var/cache/angie
          name: empty-dir
          subPath: var-cache-angie-dir
        - mountPath: /var/log/angie
          name: empty-dir
          subPath: var-log-angie-dir
        - mountPath: /tmp
          name: empty-dir
          subPath: tmp-dir
        - mountPath: /var/www/html
          name: wordpress-data
          subPath: wordpress
      - env:
        - name: WORDPRESS_DB_HOST
          value: wordpress-mariadb
        - name: WORDPRESS_DB_USER
          value: wordpress
        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-mariadb
              key: mariadb-password
        - name: WORDPRESS_DB_NAME
          value: wordpress
        image: registry-1.docker.io/library/wordpress:{{ wordpress_version }}
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 6
          initialDelaySeconds: 120
          periodSeconds: 10
          successThreshold: 1
          exec:
            command:
              - /bin/sh
              - -c
              - test -S /run/php-fpm.sock
          timeoutSeconds: 5
        name: wordpress
        resources:
          limits:
            cpu: 380m
            ephemeral-storage: 2Gi
            memory: 384Mi
          requests:
            cpu: 250m
            ephemeral-storage: 50Mi
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 82
          runAsNonRoot: true
          runAsUser: 82
        volumeMounts:
        - mountPath: /usr/local/etc/php-fpm.d/zzz-custom.conf
          name: fpm-config
          subPath: zzz-custom.conf
        - mountPath: /run
          name: empty-dir
          subPath: run-dir
        - mountPath: /tmp
          name: empty-dir
          subPath: tmp-dir
        - mountPath: /var/www/html
          name: wordpress-data
          subPath: wordpress
      restartPolicy: Always
      securityContext:
        fsGroup: 82
        fsGroupChangePolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
      - name: angie-config
        configMap:
          defaultMode: 0644
          items:
            - key: default.conf
              path: default.conf
          name: wordpress-angie
      - name: fpm-config
        configMap:
          defaultMode: 0644
          items:
            - key: php-fpm.conf
              path: zzz-custom.conf
          name: wordpress
      - emptyDir: {}
        name: empty-dir
      - name: wordpress-data
        persistentVolumeClaim:
          claimName: wordpress
...
