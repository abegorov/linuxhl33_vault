---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: nodeport-config
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 3
      envoyService:
        type: NodePort
        patch:
          type: JSONMerge
          value:
            spec:
              ports:
                - name: http
                  nodePort: 30080
                  port: 80
                  protocol: TCP
                  targetPort: 8080
                - name: https
                  nodePort: 30443
                  port: 443
                  protocol: TCP
                  targetPort: 8443
...
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: nodeport-config
    namespace: envoy-gateway-system
...
