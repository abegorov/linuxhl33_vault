---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wordpress-mariadb
  namespace: default
  labels:
    app.kubernetes.io/component: primary
    app.kubernetes.io/instance: wordpress
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: primary
      app.kubernetes.io/instance: wordpress
      app.kubernetes.io/name: mariadb
      app.kubernetes.io/part-of: mariadb
  template:
    metadata:
      labels:
        app.kubernetes.io/component: primary
        app.kubernetes.io/instance: wordpress
        app.kubernetes.io/name: mariadb
        app.kubernetes.io/part-of: mariadb
    spec:
      volumes:
      - name: empty-dir
        emptyDir: {}
      containers:
      - name: mariadb
        image: registry-1.docker.io/library/mariadb:{{
          wordpress_mariadb_version }}
        ports:
        - name: mysql
          containerPort: 3306
          protocol: TCP
        env:
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-mariadb
              key: mariadb-root-password
        - name: MARIADB_USER
          value: wordpress
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-mariadb
              key: mariadb-password
        - name: MARIADB_DATABASE
          value: wordpress
        resources:
          limits:
            cpu: 380m
            ephemeral-storage: 2Gi
            memory: 384Mi
          requests:
            cpu: 250m
            ephemeral-storage: 50Mi
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        - name: empty-dir
          mountPath: /tmp
          subPath: tmp-dir
        - name: empty-dir
          mountPath: /run/mariadb
          subPath: app-run-dir
        livenessProbe:
          exec:
            command:
            - /bin/bash
            - "-ec"
            - |
              password_aux="${MARIADB_ROOT_PASSWORD:-}"
              mariadb-admin status -uroot -p"${password_aux}"
          initialDelaySeconds: 120
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/bash
            - "-ec"
            - |
              password_aux="${MARIADB_ROOT_PASSWORD:-}"
              mariadb-admin ping -uroot -p"${password_aux}"
          initialDelaySeconds: 30
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          capabilities:
            drop:
            - ALL
          privileged: false
          runAsUser: 999
          runAsGroup: 999
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
      restartPolicy: Always
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: Always
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: primary
                  app.kubernetes.io/instance: wordpress
                  app.kubernetes.io/name: mariadb
              topologyKey: kubernetes.io/hostname
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: data
      labels:
        app.kubernetes.io/component: primary
        app.kubernetes.io/instance: wordpress
        app.kubernetes.io/name: mariadb
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 4Gi
      volumeMode: Filesystem
  serviceName: wordpress-mariadb-headless
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
...
